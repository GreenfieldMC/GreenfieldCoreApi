<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
</head>
<style>
    #info {
        background: radial-gradient(circle,rgba(238, 174, 202, 0.15) 0%, rgba(148, 187, 233, 0.21) 100%);
        margin-top: 20%;
    }
    #error {
        background: radial-gradient(circle, rgb(169 124 124 / 26%) 0%, rgb(171 171 171 / 25%) 100%);
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); text-shadow: 0px 0px 0px #0000003d }
        to { opacity: 1; transform: translateY(0); text-shadow: 0px 8px 8px #0000003d }
    }
    #message,#submessage {
        font-family: system-ui;
        font-weight: normal;
        text-align: center;
        font-size: larger;
        animation-duration: .5s;
        animation-delay: .75s;
        animation-name: fadeIn;
        animation-fill-mode: forwards;
        opacity: 0;
        text-shadow: 0px 0px 0px #0000003d
    }
    #submessage {
        font-size: medium;
        animation-delay: 1s;
        font-weight: lighter;
    }
</style>
<body id="{{BODYSTYLE}}">
    <p id="message">{{MESSAGE}}</p>
    <p id="submessage">{{SUBMESSAGE}}</p>
    <script type="text/javascript">
        window.location.href = "{{REDIRECT_URL}}";
    </script>
</body>
</html>
